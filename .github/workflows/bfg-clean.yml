name: BFG Repo Cleaner

on:
  workflow_dispatch:
    inputs:
      remove_file:
        description: "File name to remove from history (e.g. passwords.txt)"
        required: false
        default: ""
      remove_text:
        description: "Text pattern to replace (e.g. API_KEY)"
        required: false
        default: ""

jobs:
  clean-history:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Set up Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone full repo (mirror)
        run: |
          git clone --mirror https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} repo.git

      - name: Download BFG Repo-Cleaner
        run: |
          wget https://repo1.maven.org/maven2/com/madgag/bfg/1.14.0/bfg-1.14.0.jar -O bfg.jar

      - name: Run BFG - delete file from history
        if: ${{ inputs.remove_file != '' }}
        run: |
          cd repo.git
          java -jar ../bfg.jar --delete-files "${{ inputs.remove_file }}"

      - name: Run BFG - replace text in history
        if: ${{ inputs.remove_text != '' }}
        run: |
          cd repo.git
          echo "${{ inputs.remove_text }}==REDACTED" > replace.txt
          java -jar ../bfg.jar --replace-text replace.txt

      - name: Cleanup git history
        run: |
          cd repo.git
          git reflog expire --expire=now --all
          git gc --prune=now --aggressive

      - name: Remove hidden pull request refs (FIX FOR YOUR ERROR)
        run: |
          cd repo.git
          git for-each-ref refs/pull | cut -d' ' -f2 | while read ref; do
            git update-ref -d "$ref" || true
          done

      - name: Force push cleaned history
        run: |
          cd repo.git
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push --force --mirror origin
